server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ---------- Charset ----------
    charset utf-8;

    # ---------- Gzip Compression ----------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/rss+xml
        application/atom+xml
        image/svg+xml
        font/woff
        font/woff2;

    # ---------- Static Asset Caching ----------
    # Astro outputs hashed filenames for JS/CSS → cache aggressively
    location ~* \.(js|css|woff2?|ttf|eot|otf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Images: cache for 30 days
    location ~* \.(png|jpg|jpeg|gif|webp|avif|ico|svg)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
        access_log off;
    }

    # ---------- SPA / Astro Routing ----------
    # Try the exact file first, then the directory, then fall back to index.html
    location / {
        try_files $uri $uri/ $uri.html /index.html;
    }

    # ---------- Security Headers ----------
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ---------- Hide Nginx version ----------
    server_tokens off;

    # ---------- Error Pages ----------
    error_page 404 /index.html;
    error_page 500 502 503 504 /index.html;
}
